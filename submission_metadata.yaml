# ---------------------------------------------------------------------------
# AI tools declaration (transparency only, not penalized)
# ---------------------------------------------------------------------------
ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Used Claude for architecture discussion, code review, and drafting the ranker
  and documentation. All scoring logic is rule-based and human-reviewed. No
  candidate data was sent to any LLM, and no LLM is called during ranking.

# ---------------------------------------------------------------------------
# Approach summary
# ---------------------------------------------------------------------------
methodology_summary: |
  Redrob TrustScore: a transparent, rule-based ranker. Seven components —
  role fit, real-experience evidence (read from career-history text, not skill
  tags), experience-band fit, location, JD-named disqualifier penalties, a
  behavioral availability multiplier, and a honeypot consistency kill-switch —
  combine into one auditable score. The design deliberately defeats keyword
  stuffers (judges what candidates did, not what they listed) and avoids the
  ~80 honeypots via internal-consistency checks. Runs in ~17s for 100K
  candidates on CPU with no network.

